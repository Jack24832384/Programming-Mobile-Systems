<!-- Main container for item management layout -->
<div class="manage-container">
  <!-- Form section for adding/editing products -->
  <div class="form-section card">
    <h3>Add / Edit Product</h3>

    <div class="form-group">
      <label>Product ID</label>
      <input [(ngModel)]="id" placeholder="Enter product ID">
    </div>

    <div class="form-group">
      <label>Product Name</label>
      <input [(ngModel)]="name" placeholder="Enter product name">
    </div>

    <div class="form-group">
      <label>Category</label>
      <select [(ngModel)]="category">
        <option>Electronics</option>
        <option>Furniture</option>
        <option>Clothing</option>
        <option>Tools</option>
        <option>Others</option>
      </select>
    </div>

    <div class="form-group">
      <label>Quantity</label>
      <input type="number" [(ngModel)]="quantity" placeholder="Enter quantity">
    </div>

    <div class="form-group">
      <label>Price</label>
      <input type="number" [(ngModel)]="price" placeholder="Enter price">
    </div>

    <div class="form-group">
      <label>Supplier</label>
      <input [(ngModel)]="supplier" placeholder="Enter supplier">
    </div>

    <div class="form-group">
      <label>Stock Status</label>
      <select [(ngModel)]="status">
        <option>In Stock</option>
        <option>Low Stock</option>
        <option>Out of Stock</option>
      </select>
    </div>

    <div class="checkbox-group">
      <input type="checkbox" [(ngModel)]="popular" id="popular">
      <label for="popular">Popular Product</label>
    </div>

    <div class="form-group">
      <label>Notes</label>
      <textarea [(ngModel)]="comment" rows="3" placeholder="Enter notes"></textarea>
    </div>

    <button (click)="save()">Save</button>
  </div>

  <!-- Product list display section -->
  <div class="list-section card">
    <h3>Product List</h3>
    <div class="item-list">
      <div *ngFor="let item of inv.getItems()" class="item-card">
        <div class="item-info">
          <span class="item-name">{{ item.name }}</span>
          <span class="item-details">ID: {{ item.id }} | Qty: {{ item.quantity }} | Price: ${{ item.price }}</span>
        </div>
        <button class="delete-btn" (click)="delete(item.name)">Delete</button>
      </div>
    </div>
  </div>
</div>
